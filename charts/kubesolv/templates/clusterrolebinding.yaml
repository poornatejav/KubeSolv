apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesolv
  labels:
    {{- include "kubesolv.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesolv
subjects:
- kind: ServiceAccount
  name: kubesolv
  namespace: {{ include "kubesolv.namespace" . }}
