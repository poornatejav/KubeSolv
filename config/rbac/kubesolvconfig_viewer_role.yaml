# This rule is not used by the project kubesolv itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ops.kubesolv.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubesolv
    app.kubernetes.io/managed-by: kustomize
  name: kubesolvconfig-viewer-role
rules:
- apiGroups:
  - ops.kubesolv.io
  resources:
  - kubesolvconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ops.kubesolv.io
  resources:
  - kubesolvconfigs/status
  verbs:
  - get
