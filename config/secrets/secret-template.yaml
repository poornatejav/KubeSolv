# ============================================================
# KubeSolv Secrets Template
# ============================================================
# DO NOT commit this file with real values!
# Use this as a template to create your sealed secret.
#
# Option A: Use Bitnami Sealed Secrets (recommended, free)
#   1. Install sealed-secrets controller
#   2. Fill in values below
#   3. Run: kubeseal < secret.yaml > sealed-secret.yaml
#   4. Commit sealed-secret.yaml (encrypted, safe for git)
#
# Option B: Apply directly (dev/local only)
#   1. Fill in values below
#   2. Run: kubectl apply -f secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: kubesolv-credentials
  namespace: kubesolv-system
type: Opaque
stringData:
  # Google Gemini AI — powers the AI reasoning engine
  GEMINI_API_KEY: "<YOUR_GEMINI_API_KEY>"

  # Slack Bot Token — allows the bot to post messages (starts with xoxb-)
  SLACK_BOT_TOKEN: "<YOUR_SLACK_BOT_TOKEN>"

  # Slack App Token — allows WebSocket connections (starts with xapp-)
  SLACK_APP_TOKEN: "<YOUR_SLACK_APP_TOKEN>"

  # Slack Channel ID — the channel KubeSolv posts alerts to
  SLACK_CHANNEL_ID: "<YOUR_SLACK_CHANNEL_ID>"

  # Telegram Bot Token — for Telegram integration (optional)
  TELEGRAM_BOT_TOKEN: "<YOUR_TELEGRAM_BOT_TOKEN>"

  # Telegram Chat ID — the chat/group KubeSolv posts to (optional)
  TELEGRAM_CHAT_ID: "<YOUR_TELEGRAM_CHAT_ID>"

  # Prometheus URL — for metrics integration (optional, defaults to http://localhost:9090)
  PROMETHEUS_URL: "http://prometheus-server.monitoring.svc:9090"
