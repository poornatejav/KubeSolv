# ============================================================
# Example Sealed Secret (encrypted — safe to commit to git)
# ============================================================
# This file is generated by running:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# The encrypted values can ONLY be decrypted by the Sealed
# Secrets controller running inside your cluster.
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kubesolv-credentials
  namespace: kubesolv-system
spec:
  encryptedData:
    # These values are encrypted and safe to store in git.
    # Replace these with your actual sealed output.
    GEMINI_API_KEY: "<SEALED_VALUE>"
    SLACK_BOT_TOKEN: "<SEALED_VALUE>"
    SLACK_APP_TOKEN: "<SEALED_VALUE>"
    SLACK_CHANNEL_ID: "<SEALED_VALUE>"
    TELEGRAM_BOT_TOKEN: "<SEALED_VALUE>"
    TELEGRAM_CHAT_ID: "<SEALED_VALUE>"
    PROMETHEUS_URL: "<SEALED_VALUE>"
  template:
    metadata:
      name: kubesolv-credentials
      namespace: kubesolv-system
    type: Opaque
