name: Release

on:
  push:
    branches: ['release/*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.25.x'

jobs:
  # ──────────────────────────────────────
  # Lint + Vet
  # ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go vet
        run: go vet ./...

  # ──────────────────────────────────────
  # Tests
  # ──────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-coverage
          path: coverage.out
          retention-days: 90

  # ──────────────────────────────────────
  # Build Release Candidate
  # ──────────────────────────────────────
  build-rc:
    name: Build RC Image
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      rc_tag: ${{ steps.version.outputs.rc_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "version=${BRANCH}" >> $GITHUB_OUTPUT
          echo "rc_tag=rc-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RC
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.rc_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────
  # Manual Approval Gate
  # ──────────────────────────────────────
  approval:
    name: Awaiting Approval
    needs: [build-rc]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "✅ Approved by ${{ github.actor }}"

  # ──────────────────────────────────────
  # Promote to Release
  # ──────────────────────────────────────
  promote:
    name: Promote Release
    needs: [approval, build-rc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/google/go-containerregistry/releases/latest" | jq -r '.tag_name')
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" > crane.tar.gz
          tar -zxvf crane.tar.gz -C /usr/local/bin/ crane
          chmod +x /usr/local/bin/crane

      - name: Promote RC to release
        env:
          RC_TAG: ${{ needs.build-rc.outputs.rc_tag }}
          VERSION: ${{ needs.build-rc.outputs.version }}
        run: |
          crane auth login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          crane tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${RC_TAG} ${VERSION}
          crane tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${RC_TAG} latest

  # ──────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: [promote, build-rc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-rc.outputs.version }}
          name: KubeSolv ${{ needs.build-rc.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
